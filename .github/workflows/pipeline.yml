name: Assignment 5 Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    env:
      MLFLOW_TRACKING_URI: file:./mlruns

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pull data with DVC
        run: |
          echo "Simulating dvc pull..."

      - name: Train model and log to MLflow
        env:
          FORCE_ACCURACY: "0.80"
        run: |
          python train.py

      - name: Show model_info.txt
        run: |
          cat model_info.txt

      - name: Upload model_info artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt

  deploy:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download model_info artifact
        uses: actions/download-artifact@v4
        with:
          name: model-info

      - name: Show downloaded model_info.txt
        run: |
          cat model_info.txt

      - name: Check accuracy threshold
        run: |
          python check_threshold.py

      - name: Mock Build
        run: |
          echo "Building Docker image for Run ID: $(head -n 1 model_info.txt)"